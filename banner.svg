<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1920" y2="1080" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111f"/>
      <stop offset="1" stop-color="#1a1508"/>
    </linearGradient>
    <radialGradient id="blob-gold-left" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(300 540) rotate(0) scale(700)">
      <stop stop-color="#e8c453" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#e8c453" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob-gold-right" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1620 540) rotate(0) scale(700)">
      <stop stop-color="#f0d06b" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#f0d06b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sl-grad" x1="0" y1="0" x2="320" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#e8c453"/>
      <stop offset="1" stop-color="#f0d06b"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0" y1="0" x2="800" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f0e4c0"/>
    </linearGradient>
    <filter id="logo-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur1"/>
      <feGaussianBlur stdDeviation="14" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#2a2414" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#grid)" opacity="0.35"/>
  <rect width="1920" height="1080" fill="url(#blob-gold-left)"/>
  <rect width="1920" height="1080" fill="url(#blob-gold-right)"/>

  <!-- Logo mark -->
  <g transform="translate(420, 380) scale(5)" filter="url(#logo-glow)" stroke="url(#sl-grad)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M22 16 C16 16, 14 20, 14 24 C14 28, 16 32, 22 32"/>
    <path d="M22 16 L42 16"/>
    <path d="M42 16 C48 16, 50 20, 50 24 C50 28, 48 32, 42 32"/>
    <path d="M42 48 C48 48, 50 44, 50 40 C50 36, 48 32, 42 32"/>
    <path d="M42 48 L22 48"/>
    <path d="M22 48 C16 48, 14 44, 14 40 C14 36, 16 32, 22 32"/>
  </g>

  <!-- Wordmark -->
  <text x="780" y="540" font-family="Inter, -apple-system, sans-serif" font-size="180" font-weight="700" fill="url(#text-grad)" letter-spacing="-4">SubLink</text>

  <!-- Tagline -->
  <text x="784" y="620" font-family="Inter, -apple-system, sans-serif" font-size="42" font-weight="500" fill="#b8a676" letter-spacing="0.5">Privacy-preserving subscriptions with Unlink</text>

  <!-- Accent line -->
  <rect x="784" y="660" width="120" height="4" rx="2" fill="#e8c453"/>

  <!-- Footer chips -->
  <g font-family="Inter, -apple-system, sans-serif" font-size="24" font-weight="500" fill="#b8a676">
    <g transform="translate(784, 720)">
      <rect x="0" y="0" width="210" height="48" rx="24" fill="#1a1408" stroke="#3a3015" stroke-width="1"/>
      <text x="105" y="32" text-anchor="middle">Unlink Protocol</text>
    </g>
    <g transform="translate(1010, 720)">
      <rect x="0" y="0" width="270" height="48" rx="24" fill="#1a1408" stroke="#3a3015" stroke-width="1"/>
      <text x="135" y="32" text-anchor="middle">Private Subscriptions</text>
    </g>
    <g transform="translate(1296, 720)">
      <rect x="0" y="0" width="210" height="48" rx="24" fill="#1a1408" stroke="#3a3015" stroke-width="1"/>
      <text x="105" y="32" text-anchor="middle">Creator Economy</text>
    </g>
  </g>
</svg>
